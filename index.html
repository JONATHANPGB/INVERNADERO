<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventario Pro - Invernadero</title>
<style>
body{font-family:Arial;background:background-image: url("colm.png");margin:10px;}
h1{text-align:center;color:#59b0d9;}
.container{max-width:1100px;margin:auto;background:white;padding:15px;border-radius:10px;}
input,select,button{padding:8px;margin:5px;width:100%;}
button{background:#59b0d9;color:white;border:none;cursor:pointer;}
table{width:100%;border-collapse:collapse;margin-top:15px;background:white;}
th,td{border:1px solid #ccc;padding:8px;text-align:center;}
th{background:#59b0d9;color:white;}
@media(min-width:600px){input,select{width:auto;}}
</style>
</head>
<body>

<div class="container">
<h1>Inventario INVERNADERO</h1>

<input type="text" id="buscar" placeholder="Buscar..." onkeyup="buscar()">

<input type="text" id="nombre" placeholder="Nombre">
<input type="number" id="cantidad" placeholder="Cantidad">
<input type="text" id="rollos" placeholder="Rollos">
<input type="text" id="clave" placeholder="Clave">
<select id="estado">
<option>Bueno</option>
<option>Regular</option>
<option>Malo</option>
</select>
<input type="text" id="ubicacion" placeholder="Ubicación">
<input type="text" id="usuario" placeholder="Responsable">
<input type="text" id="observaciones" placeholder="Observaciones">

<button onclick="agregarItem()">Agregar</button>
<button onclick="exportarExcel()">Exportar Excel</button>

<table>
<thead>
<tr>
<th>Nombre</th>
<th>Cantidad</th>
<th>Rollos</th>
<th>Clave</th>
<th>Estado</th>
<th>Ubicación</th>
<th>Responsable</th>
<th>Fecha</th>
<th>Observaciones</th>
<th>Acciones</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

<script>
let datos = JSON.parse(localStorage.getItem("inventario")) || [];
let editIndex = null;

function guardar(){
localStorage.setItem("inventario", JSON.stringify(datos));
}

function fechaActual(){
let f = new Date();
return f.toLocaleDateString() + " " + f.toLocaleTimeString();
}

function render(){
let tabla = document.getElementById("tabla");
tabla.innerHTML="";

datos.forEach((item,index)=>{
tabla.innerHTML += `
<tr>
<td>${item.nombre}</td>
<td>${item.cantidad}</td>
<td>${item.rollos}</td>
<td>${item.clave}</td>
<td>${item.estado}</td>
<td>${item.ubicacion}</td>
<td>${item.usuario}</td>
<td>${item.fecha}</td>
<td>${item.observaciones}</td>
<td>
<button onclick="editar(${index})">Editar</button>
<button onclick="eliminar(${index})">Eliminar</button>
</td>
</tr>`;
});
}

function agregarItem(){
let item = {
nombre:nombre.value,
cantidad:cantidad.value,
rollos:rollos.value,
clave:clave.value,
estado:estado.value,
ubicacion:ubicacion.value,
usuario:usuario.value,
observaciones:observaciones.value,
fecha: fechaActual()
};

if(item.nombre===""||item.cantidad===""){
alert("Faltan datos");
return;
}

if(editIndex===null){
datos.push(item);
}else{
datos[editIndex]=item;
editIndex=null;
}

guardar();
render();
limpiar();
}

function editar(index){
let i = datos[index];

nombre.value=i.nombre;
cantidad.value=i.cantidad;
rollos.value=i.rollos;
clave.value=i.clave;
estado.value=i.estado;
ubicacion.value=i.ubicacion;
usuario.value=i.usuario;
observaciones.value=i.observaciones;

editIndex=index;
}

function eliminar(index){
datos.splice(index,1);
guardar();
render();
}

function limpiar(){
document.querySelectorAll("input").forEach(i=>i.value="");
editIndex=null;
}

function buscar(){
let filtro=document.getElementById("buscar").value.toLowerCase();
let filas=document.querySelectorAll("tbody tr");
filas.forEach(f=>{
f.style.display=f.innerText.toLowerCase().includes(filtro)?"":"none";
});
}

function exportarExcel(){
let contenido="Nombre,Cantidad,Rollos,Clave,Estado,Ubicacion,Responsable,Fecha,Observaciones\n";

datos.forEach(i=>{
contenido+=`${i.nombre},${i.cantidad},${i.rollos},${i.clave},${i.estado},${i.ubicacion},${i.usuario},${i.fecha},${i.observaciones}\n`;
});

let blob=new Blob([contenido],{type:'text/csv'});
let url=URL.createObjectURL(blob);
let a=document.createElement("a");
a.href=url;
a.download="inventario_pro.csv";
a.click();
}

render();
</script>

</body>
</html>
